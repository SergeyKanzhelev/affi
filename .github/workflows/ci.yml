name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run unit tests
        run: npx jest --testPathPattern='tests/(content|parser)\.test\.js' --coverage

      - name: Run E2E tests
        run: npx jest --testPathPattern='tests/e2e-automated\.js'
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'false'
